name: Deploy Frontend

# Este solo se activa si modificas algo dentro de la carpeta 'frontend'
on:
  push:
    branches:
      - deploy
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1 # 👈 Cambia tu región si es distinta

    - name: Login en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # Construir y subir la imagen del Front usando su Dockerfile Multi-stage
    - name: Construir y Publicar Imagen del Frontend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: tienda-frontend # 👈 REEMPLAZA CON EL NOMBRE DE TU REPOSITORIO ECR DEL FRONTEND
        IMAGE_TAG: latest
      run: |
        cd frontend
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # Desplegar en la EC2 del Front usando AWS SSM
    - name: Desplegar Frontend en EC2 vía SSM
      env:
        INSTANCE_ID: ${{ secrets.EC2_FRONTEND_INSTANCE_ID }}
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: tienda-frontend # 👈 El mismo nombre de tu ECR del frontend
      run: |
        COMMANDS=$(cat << EOF
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $REGISTRY
        docker pull $REGISTRY/$REPOSITORY:latest
        docker stop tienda-frontend || true
        docker rm tienda-frontend || true
        docker run -d --name tienda-frontend -p 80:80 $REGISTRY/$REPOSITORY:latest
        EOF
        )
        
        aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "commands=[$COMMANDS]" \
          --comment "Despliegue automático Frontend desde GitHub Actions"