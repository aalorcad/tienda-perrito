name: Deploy Backend

# El pipeline solo se activa si subes cambios a la rama deploy
# Y exclusivamente si modificas algo dentro de la carpeta 'backend'
on:
  push:
    branches:
      - deploy
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código en el entorno de GitHub
    - name: Checkout del código
      uses: actions/checkout@v3

    # 2. Autenticarse en AWS usando tus Secrets
    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1 # 👈 Cambia tu región si es distinta

    # 3. Autenticarse en Amazon ECR
    - name: Login en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # 4. Construir la imagen Multi-stage y subirla a ECR
    - name: Construir y Publicar Imagen del Backend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: tienda-perrito-back # 👈 REEMPLAZA CON EL NOMBRE DE TU REPOSITORIO ECR DEL BACKEND
        IMAGE_TAG: latest
      run: |
        cd backend
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 5. Desplegar en la EC2 usando AWS SSM (Mínimo Privilegio, sin llaves SSH)
    - name: Desplegar Backend en EC2 vía SSM
      env:
        INSTANCE_ID: ${{ secrets.EC2_BACKEND_INSTANCE_ID }}
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: tienda-perrito-back # 👈 El mismo nombre de tu ECR del backend
      run: |
        COMMANDS=$(cat << EOF
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $REGISTRY
        docker pull $REGISTRY/$REPOSITORY:latest
        docker stop tienda-perrito-backend || true
        docker rm tienda-perrito-backend || true
        docker run -d --name tienda-perrito-backend -p 3000:3000 $REGISTRY/$REPOSITORY:latest
        EOF
        )
        
        aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "commands=[$COMMANDS]" \
          --comment "Despliegue automático Backend desde GitHub Actions"